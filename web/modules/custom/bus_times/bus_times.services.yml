services:
  bus_times.bods_api_client:
    class: Drupal\bus_times\Service\BodsApiClient
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@key.repository'
      - '@logger.channel.bus_times'

  bus_times.data_provider.bods:
    class: Drupal\bus_times\DataProvider\BodsDataProvider
    arguments:
      - '@bus_times.bods_api_client'

  bus_times.gtfs_filter:
    class: Drupal\bus_times\Service\GtfsFilter
    arguments:
      - '@config.factory'
      - '@logger.channel.bus_times'

  logger.channel.bus_times:
    parent: logger.channel_base
    arguments: ['bus_times']
