services:
  localgov_bus_data.bods_api_client:
    class: Drupal\localgov_bus_data\Service\BodsApiClient
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@key.repository'
      - '@logger.channel.localgov_bus_data'

  localgov_bus_data.data_provider.bods:
    class: Drupal\localgov_bus_data\DataProvider\BodsDataProvider
    arguments:
      - '@localgov_bus_data.bods_api_client'

  localgov_bus_data.gtfs_filter:
    class: Drupal\localgov_bus_data\Service\GtfsFilter
    arguments:
      - '@config.factory'
      - '@logger.channel.localgov_bus_data'

  logger.channel.localgov_bus_data:
    parent: logger.channel_base
    arguments: ['localgov_bus_data']
